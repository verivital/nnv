# This is a basic workflow to help you get started with MATLAB Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      run_cp:
        type: boolean
        required: false
        default: false

jobs:
  # This workflow contains a single job called "build"
  test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      # Sets up MATLAB on the GitHub Actions runner
      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b
          products: >
            Computer_Vision_Toolbox
            Control_System_Toolbox
            Deep_Learning_Toolbox
            Image_Processing_Toolbox
            Optimization_Toolbox
            Parallel_Computing_Toolbox
            Statistics_and_Machine_Learning_Toolbox
            Symbolic_Math_Toolbox
            System_Identification_Toolbox
            Deep_Learning_Toolbox_Converter_for_ONNX_Model_Format
            Deep_Learning_Toolbox_Converter_for_PyTorch_Model_Format
            Deep_Learning_Toolbox_Converter_for_TensorFlow_models

      # Sets up python for CP
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Setup CP requirements
        if: github.event.inputs.run_cp == 'true'
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirement.txt
        continue-on-error: true
      # Cache the tbxmanager toolboxes (MPT/glpk/sedumi/etc.) install.m downloads from the
      # ETH/tbxmanager server. OS/arch-keyed (glnxa64), MATLAB-release-independent, so this
      # cache is shared with the R2026a matrix CI. startup_nnv's `tbxmanager restorepath`
      # re-adds them from this dir -> install.m's downloads become no-ops on a warm cache.
      # Force-refresh by running the "CI (matrix-sharded)" workflow with rebuild_cache=true
      # (it deletes the repo-wide nnv-tbxmanager-* cache).
      - name: Cache NNV tbxmanager toolboxes
        uses: actions/cache@v4
        with:
          path: code/nnv/tbxmanager
          key: nnv-tbxmanager-${{ runner.os }}-${{ hashFiles('code/nnv/install.m') }}
          restore-keys: |
            nnv-tbxmanager-${{ runner.os }}-
      # Runs a set of commands using the runners shell
      - name: Run all tests
        uses: matlab-actions/run-command@v2
        with:
          command: disp('Running NNV custom testing procedure!'); diary github_actions.txt; disp('creating file for testing'); diary off; cd("code/nnv"); install; results = runtests('tests', 'IncludeSubfolders', true); assertSuccess(results);
