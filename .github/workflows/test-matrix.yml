name: CI (matrix-sharded)

# Fast, fan-out CI for NNV. Splits the test suite into N DURATION-BALANCED parallel shards
# on free GitHub-hosted runners (public repo -> matlab-actions auto-licenses all toolboxes,
# no token needed). Standard shards exclude only GPU tests (no GPU) and tests confirmed to
# crash the runner; everything else runs (failures incl. WIP stay visible). The `report`
# job aggregates all shard results, classifies known-WIP vs new regressions, flags crashes,
# and gates the build. The shard count auto-scales with the suite. (See CLOUD_COMPUTE_OPTIONS.md.)

on:
  workflow_dispatch:
    inputs:
      release:
        description: "MATLAB release (e.g. R2026a, R2024b)"
        type: string
        default: "R2026a"
      num_shards:
        description: "Number of parallel shards (blank = auto-scale from suite size)"
        type: string
        default: ""
      run_highmem:
        description: "Also run high-memory tests (needs a big-RAM/self-hosted runner)"
        type: boolean
        default: false
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "transformer" ]

concurrency:
  group: ci-matrix-${{ github.ref }}
  cancel-in-progress: true

env:
  MATLAB_RELEASE: ${{ github.event.inputs.release || 'R2026a' }}

jobs:
  # Decide the shard count and build the index list [1..N]. Uses the workflow_dispatch
  # input if given, else AUTO-SCALES from test_durations.csv. We deliberately OVER-shard
  # (~2 min of *local* test time per shard, clamped [8,24]): local Windows durations are
  # only an estimate of Linux-CI time, so smaller shards keep an under-estimated test from
  # overloading a shard, and the per-shard step timeout bounds any remaining surprise.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
      n: ${{ steps.gen.outputs.n }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        run: |
          IN="${{ github.event.inputs.num_shards }}"
          if [ -n "$IN" ]; then
            N="$IN"
          else
            CSV=code/nnv/tests/test_durations.csv
            if [ -f "$CSV" ]; then
              TOTAL=$(awk -F, 'NR>1{s+=$NF} END{printf "%d", s+0}' "$CSV")
            else
              TOTAL=1600
            fi
            N=$(( (TOTAL + 119) / 120 ))
            [ "$N" -lt 8 ] && N=8
            [ "$N" -gt 24 ] && N=24
          fi
          echo "Using N=$N shards"
          echo "n=$N" >> "$GITHUB_OUTPUT"
          echo "shards=$(seq 1 "$N" | jq -R . | jq -cs .)" >> "$GITHUB_OUTPUT"

  # Duration-balanced standard shards on free ~16 GB ubuntu-latest runners.
  # Failures are recorded (not hard-failed here); the report job gates the build.
  standard:
    needs: prepare
    name: tests ${{ matrix.shard }}/${{ needs.prepare.outputs.n }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_RELEASE }}
          products: >
            Computer_Vision_Toolbox
            Control_System_Toolbox
            Deep_Learning_Toolbox
            Image_Processing_Toolbox
            Optimization_Toolbox
            Parallel_Computing_Toolbox
            Statistics_and_Machine_Learning_Toolbox
            Symbolic_Math_Toolbox
            System_Identification_Toolbox
            Deep_Learning_Toolbox_Converter_for_ONNX_Model_Format
            Deep_Learning_Toolbox_Converter_for_PyTorch_Model_Format
      - name: Run shard ${{ matrix.shard }} of ${{ needs.prepare.outputs.n }}
        uses: matlab-actions/run-command@v2
        timeout-minutes: 15
        continue-on-error: true   # on timeout, fail the step but let the job upload its
                                  # progress trace (so the report can name the hanging test)
        with:
          command: cd('code/nnv'); install; addpath(genpath(fullfile(pwd,'tests'))); run_shard(${{ matrix.shard }}, ${{ needs.prepare.outputs.n }}, 'standard');
      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-standard-shard-${{ matrix.shard }}
          path: code/nnv/test-results-ci/*
          if-no-files-found: ignore

  # Aggregate all shard results into one report: preserves failure logs, classifies
  # known-WIP (ci_allowed_failures.txt) vs new regressions, flags crashes; GATES the build
  # (red only on new failures or crashes). Always runs, even if shards crashed.
  report:
    needs: standard
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ci-artifacts
          pattern: results-standard-shard-*
          merge-multiple: true
      - name: Aggregate shard results
        run: python3 code/nnv/tests/ci_report.py ci-artifacts --allowed code/nnv/tests/ci_allowed_failures.txt

  # High-memory tests. OPT-IN (run_highmem=true). Point this at a big-RAM runner via the
  # NNV_HIGHMEM_RUNNER repo variable (a self-hosted runner label, e.g. 'nnv-highmem');
  # defaults to ubuntu-latest if unset. Use for tests confirmed to crash the standard runner.
  highmem:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_highmem == 'true' }}
    name: high-memory tests
    runs-on: ${{ vars.NNV_HIGHMEM_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.MATLAB_RELEASE }}
          products: >
            Computer_Vision_Toolbox
            Control_System_Toolbox
            Deep_Learning_Toolbox
            Image_Processing_Toolbox
            Optimization_Toolbox
            Parallel_Computing_Toolbox
            Statistics_and_Machine_Learning_Toolbox
            Symbolic_Math_Toolbox
            System_Identification_Toolbox
            Deep_Learning_Toolbox_Converter_for_ONNX_Model_Format
            Deep_Learning_Toolbox_Converter_for_PyTorch_Model_Format
      - name: Run high-memory tests
        uses: matlab-actions/run-command@v2
        timeout-minutes: 60
        with:
          command: cd('code/nnv'); install; addpath(genpath(fullfile(pwd,'tests'))); run_shard(1, 1, 'highmem');
      - name: Upload high-memory results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-highmem
          path: code/nnv/test-results-ci/*
          if-no-files-found: ignore
